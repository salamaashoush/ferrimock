name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly run to catch upstream breakage
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

# ---------------------------------------------------------------------------
# Gate: cheap jobs that must pass before expensive ones run
# ---------------------------------------------------------------------------
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  typos:
    name: Spell check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-features --all-targets

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --all-features --no-deps

  # Gate job: all cheap checks must pass
  basics:
    name: Basics gate
    runs-on: ubuntu-latest
    needs: [fmt, typos, clippy, doc]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.typos.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.doc.result }}" != "success" ]]; then
            echo "One or more basic checks failed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Tests: run after basics gate passes
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: [basics]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --no-fail-fast
      # nextest cannot run doc tests
      - run: cargo test --doc --workspace

  # ---------------------------------------------------------------------------
  # Feature flag verification
  # ---------------------------------------------------------------------------
  features:
    name: Feature combinations
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-hack
      - name: Check each feature independently
        run: cargo hack check -p mockpit --each-feature --no-dev-deps
      - name: Check feature powerset (depth 2)
        run: cargo hack check -p mockpit --feature-powerset --depth 2 --no-dev-deps

  # ---------------------------------------------------------------------------
  # MSRV: ensure minimum supported Rust version still compiles
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-hack
      - name: Check MSRV
        run: cargo hack check --rust-version --workspace --all-features --ignore-private

  # ---------------------------------------------------------------------------
  # Minimal versions: verify lower bounds of dependencies are correct
  # ---------------------------------------------------------------------------
  minimal-versions:
    name: Minimal versions
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Resolve minimal versions
        run: cargo +nightly update -Z minimal-versions
      - name: Check with minimal versions
        run: cargo +stable check --workspace --all-features

  # ---------------------------------------------------------------------------
  # Semver: catch accidental breaking changes
  # ---------------------------------------------------------------------------
  semver:
    name: Semver check
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only check on PRs (needs a baseline to compare against)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: mockpit

  # ---------------------------------------------------------------------------
  # Security: audit dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lockfile: ensure Cargo.lock is committed and up to date
  # ---------------------------------------------------------------------------
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --locked --workspace --all-features

  # ---------------------------------------------------------------------------
  # Conclusion: aggregator for branch protection rules
  # ---------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: always()
    needs:
      - test
      - features
      - msrv
      - minimal-versions
      - security
      - lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Result
        run: |
          jq -ce '.[] | select(.result != "success" and .result != "skipped")' <<< '${{ toJson(needs) }}' \
            && echo "Some jobs failed" && exit 1 \
            || echo "All jobs passed or were skipped"
