name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly run to catch upstream breakage
    - cron: "30 3 * * *"

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTDOCFLAGS: -Dwarnings

# ---------------------------------------------------------------------------
# Gate: cheap jobs that must pass before expensive ones run
# ---------------------------------------------------------------------------
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  typos:
    name: Spell check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-features --all-targets -- --deny warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --all-features --no-deps

  # Gate job: all cheap checks must pass
  basics:
    name: Basics gate
    runs-on: ubuntu-latest
    needs: [fmt, typos, clippy, doc]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.typos.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.doc.result }}" != "success" ]]; then
            echo "One or more basic checks failed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Rust tests: run after basics gate passes
  # ---------------------------------------------------------------------------
  test-rust:
    name: Rust tests (${{ matrix.os }})
    needs: [basics]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --no-fail-fast
      # nextest cannot run doc tests
      - run: cargo test --doc --workspace

  # ---------------------------------------------------------------------------
  # NAPI build + JS tests
  # ---------------------------------------------------------------------------
  test-napi:
    name: NAPI + JS tests (${{ matrix.os }})
    needs: [basics]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
      - name: Build NAPI native module
        working-directory: crates/mockpit-napi
        run: bunx @napi-rs/cli build --platform --release
      - name: Run JS tests
        run: bun test ./packages/core/test/ ./crates/mockpit-napi/test/

  # ---------------------------------------------------------------------------
  # Feature flag verification
  # ---------------------------------------------------------------------------
  features:
    name: Feature combinations
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-hack
      - name: Check each feature independently
        run: cargo hack check -p mockpit --each-feature --no-dev-deps
      - name: Check feature powerset (depth 2)
        run: cargo hack check -p mockpit --feature-powerset --depth 2 --no-dev-deps

  # ---------------------------------------------------------------------------
  # MSRV: the stable feature set must build on the declared rust-version
  # (the scripting feature needs nightly regardless - oxc uses if-let guards)
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV 1.91 (stable features)
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check -p mockpit --features engine,server,api,graphql,schema
      - run: cargo check -p mockpit-napi

  # ---------------------------------------------------------------------------
  # Packaging: catch publish rot before release day
  # ---------------------------------------------------------------------------
  packaging:
    name: Publish dry-run
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # mockpit-cli cannot dry-run here: its verify build resolves the
      # mockpit dep from crates.io, which lags the workspace version.
      - run: cargo publish --dry-run -p mockpit
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
      - run: bun run build
      - name: npm pack dry-run for every published package
        run: |
          for pkg in packages/core packages/mockpit packages/playwright crates/mockpit-napi crates/mockpit-cli/npm-shim; do
            echo "--- $pkg"
            npm pack --dry-run "./$pkg"
          done

  # ---------------------------------------------------------------------------
  # Benchmarks: nightly matcher-path regression watch. Compares against the
  # previous scheduled run's criterion baseline (restored from cache) and
  # fails on >15% mean regression - well below the noise floor of a real
  # regression, well above shared-runner jitter on these benches.
  # ---------------------------------------------------------------------------
  bench:
    name: Matcher benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Restore criterion baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.run_id }}
          restore-keys: criterion-baseline-
      - name: Run matcher benches
        run: |
          cargo bench --bench mock_performance -p mockpit -- \
            'simple_exact_match|complex_match|pattern_matching_scale|miss_at_scale' \
            2>&1 | tee bench.log
      - name: Fail on regressions
        run: |
          python3 - <<'EOF'
          import re, sys

          name = None
          worst = []
          for line in open("bench.log"):
              stripped = line.strip()
              bench = re.match(r"^([A-Za-z0-9_/]+/[A-Za-z0-9_/]+)$", stripped)
              if bench:
                  name = bench.group(1)
                  continue
              change = re.search(r"change:\s*\[[^ ]+ ([+-][0-9.]+)% ", stripped)
              if change and name:
                  pct = float(change.group(1))
                  if pct > 15.0:
                      worst.append((name, pct))

          if worst:
              for name, pct in worst:
                  print(f"REGRESSION {name}: +{pct:.1f}%")
              sys.exit(1)
          print("no matcher regressions above 15%")
          EOF
  semver:
    name: Semver check
    needs: [basics]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: mockpit

  # ---------------------------------------------------------------------------
  # Security: audit dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lockfile: ensure Cargo.lock is committed and up to date
  # ---------------------------------------------------------------------------
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo check --locked --workspace --all-features

  # ---------------------------------------------------------------------------
  # Conclusion: aggregator for branch protection rules
  # ---------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: always()
    needs:
      - test-rust
      - test-napi
      - features
      - msrv
      - packaging
      - bench
      - security
      - lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Result
        run: |
          jq -ce '.[] | select(.result != "success" and .result != "skipped")' <<< '${{ toJson(needs) }}' \
            && echo "Some jobs failed" && exit 1 \
            || echo "All jobs passed or were skipped"
