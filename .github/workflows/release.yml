name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Create a draft GitHub release with changelog
  # ---------------------------------------------------------------------------
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # A tag that disagrees with the manifests would publish crates at
      # one version and GitHub/npm artifacts at another.
      - name: Verify tag matches manifest versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          fail=0
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "workspace Cargo.toml is $CARGO_VERSION but tag is $TAG_VERSION"
            fail=1
          fi
          for pkg in packages/core packages/mockpit packages/playwright crates/mockpit-napi crates/mockpit-cli/npm-shim; do
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "$pkg/package.json is $PKG_VERSION but tag is $TAG_VERSION"
              fail=1
            fi
          done
          exit $fail
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.changelog.outputs.content }}"

  # ---------------------------------------------------------------------------
  # Rust tests: the publish jobs must not ship a tag CI never validated
  # ---------------------------------------------------------------------------
  test-rust:
    name: Rust tests
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features --no-fail-fast

  # ---------------------------------------------------------------------------
  # Build Rust CLI binaries for all platforms
  # ---------------------------------------------------------------------------
  build-cli:
    name: CLI ${{ matrix.target }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p mockpit-cli
          else
            cargo build --release --target ${{ matrix.target }} -p mockpit-cli
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="mockpit-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" mockpit
          cd ../../..
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ARCHIVE="mockpit-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip"
          cd target/${{ matrix.target }}/release
          7z a "../../../${ARCHIVE}" mockpit.exe
          cd ../../..
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Attest archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ${{ env.ARCHIVE }} ${{ env.ARCHIVE }}.sha256 --clobber
        shell: bash

      # Raw binary for the npm platform packages (@mockpit/cli-*),
      # assembled by npm-shim/scripts/prepare.mjs in publish-npm.
      - name: Upload npm binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-npm-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mockpit${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build NAPI native modules for all platforms
  # ---------------------------------------------------------------------------
  build-napi:
    name: NAPI ${{ matrix.settings.target }}
    needs: [create-release]
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bunx @napi-rs/cli build --platform --release --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              bunx @napi-rs/cli build --platform --release --target aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bunx @napi-rs/cli build --platform --release --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bunx @napi-rs/cli build --platform --release --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bunx @napi-rs/cli build --platform --release --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bunx @napi-rs/cli build --platform --release --target aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
      - name: Build native module
        working-directory: crates/mockpit-napi
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.settings.target }}
          path: crates/mockpit-napi/*.node
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Run JS tests with built NAPI module
  # ---------------------------------------------------------------------------
  test-napi:
    name: JS tests
    needs: [build-napi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: napi-x86_64-unknown-linux-gnu
          path: crates/mockpit-napi/
      # Tests import the packages by name ('@mockpit/core', 'mockpit'),
      # which resolve through dist/ - they need the JS build.
      - name: Build JS packages
        run: bun run build
      - name: Run JS tests
        run: bun test ./packages/core/test/ ./crates/mockpit-napi/test/

  # ---------------------------------------------------------------------------
  # Publish to crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    # Publishing is irreversible - every build and test must be green first.
    needs: [create-release, test-rust, test-napi, build-cli, build-napi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly

      - name: Publish mockpit library crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          output=$(cargo publish -p mockpit --token "$CARGO_REGISTRY_TOKEN" 2>&1) && exit 0
          if echo "$output" | grep -q "already exists"; then
            echo "mockpit already published, skipping"
          else
            echo "$output"
            exit 1
          fi
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish mockpit-cli crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          output=$(cargo publish -p mockpit-cli --token "$CARGO_REGISTRY_TOKEN" 2>&1) && exit 0
          if echo "$output" | grep -q "already exists"; then
            echo "mockpit-cli already published, skipping"
          else
            echo "$output"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Publish to npm
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: [create-release, test-rust, build-cli, build-napi, test-napi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm --provenance signs through the Actions OIDC token.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # npm publish authenticates through the .npmrc this step writes
      # (NODE_AUTH_TOKEN alone does nothing without it).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: bun install

      - name: Download all native modules
        uses: actions/download-artifact@v4
        with:
          path: crates/mockpit-napi/artifacts
          pattern: napi-*
          merge-multiple: false

      # The per-platform package dirs are not committed; create them from
      # the napi.targets list before moving binaries into them.
      - name: Create platform package dirs
        working-directory: crates/mockpit-napi
        run: bunx @napi-rs/cli create-npm-dirs
        shell: bash

      - name: Move artifacts
        working-directory: crates/mockpit-napi
        run: |
          bunx @napi-rs/cli artifacts -o . --npm-dir npm
        shell: bash

      - name: Publish @mockpit/node
        working-directory: crates/mockpit-napi
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mockpit/core
        working-directory: packages/core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mockpit (bare-specifier alias)
        working-directory: packages/mockpit
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mockpit/playwright
        working-directory: packages/playwright
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          path: cli-artifacts
          pattern: cli-npm-*
          merge-multiple: false

      - name: Prepare CLI platform packages
        working-directory: crates/mockpit-cli/npm-shim
        run: node scripts/prepare.mjs "${{ needs.create-release.outputs.version }}" "${{ github.workspace }}/cli-artifacts"

      # Platform packages first so the shim's optionalDependencies
      # resolve as soon as it lands.
      - name: Publish CLI platform packages
        working-directory: crates/mockpit-cli/npm-shim
        run: |
          for pkg in npm/*/; do
            npm publish "$pkg" --access public --provenance
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mockpit/cli
        working-directory: crates/mockpit-cli/npm-shim
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish the release (un-draft after all builds succeed)
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish release
    needs: [build-cli, build-napi, test-napi, publish-crates, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
