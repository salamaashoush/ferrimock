mocks:
- id: prefetch-current-user
  priority: 200
  match:
    methods:
    - GET
    url: ^/app-api/enduserapp/current-user$
  response:
    status: 200
    headers:
      content-type: application/json
    body:
      avatar_url: https://app.example.com/api/avatar/large/12345678
      created_at: 2024-01-01T00:00:00Z
      enterprise:
        id: "11111"
        name: Offline Enterprise
        type: enterprise
      id: "12345678"
      language: en
      login: offline-user@example.com
      max_upload_size: 5368709120
      modified_at: 2024-01-01T00:00:00Z
      name: Offline User
      space_amount: 10737418240
      space_used: 1073741824
      status: active
      timezone: America/Los_Angeles
      type: user
- id: get-folder-items
  match:
    methods:
    - GET
    url: ^/2\.0/folders/\d+/items
  response:
    status: 200
    headers:
      content-type: application/json
    body:
      entries:
      - created_at: 2024-01-01T00:00:00Z
        id: "11111"
        modified_at: 2024-01-02T00:00:00Z
        name: Documents
        type: folder
      - created_at: 2024-01-01T00:00:00Z
        id: "22222"
        modified_at: 2024-01-02T00:00:00Z
        name: presentation.pdf
        size: 1024000
        type: file
      - created_at: 2024-01-01T00:00:00Z
        id: "33333"
        modified_at: 2024-01-02T00:00:00Z
        name: spreadsheet.xlsx
        size: 512000
        type: file
      limit: 100
      offset: 0
      order:
      - by: type
        direction: ASC
      - by: name
        direction: ASC
      total_count: 3
- id: get-folder-details
  match:
    methods:
    - GET
    url: ^/2\.0/folders/\d+$
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "type": "folder",
        "id": "{{ captures[0] }}",
        "name": "All Files",
        "created_at": "2024-01-01T00:00:00Z",
        "modified_at": "2024-01-02T00:00:00Z",
        "description": "Root folder for offline mode testing",
        "size": 1536000,
        "path_collection": {
          "total_count": 1,
          "entries": [
            {
              "type": "folder",
              "id": "0",
              "name": "All Files"
            }
          ]
        },
        "created_by": {
          "type": "user",
          "id": "12345678",
          "name": "Offline User",
          "login": "offline-user@example.com"
        },
        "modified_by": {
          "type": "user",
          "id": "12345678",
          "name": "Offline User",
          "login": "offline-user@example.com"
        },
        "owned_by": {
          "type": "user",
          "id": "12345678",
          "name": "Offline User",
          "login": "offline-user@example.com"
        },
        "item_status": "active",
        "item_collection": {
          "total_count": 3,
          "entries": [],
          "offset": 0,
          "limit": 100
        }
      }
- id: get-users-me
  match:
    methods:
    - GET
    url: ^/(api/)?2\.0/users/me$
  response:
    status: 200
    headers:
      content-type: application/json
    body:
      address: San Francisco, CA
      avatar_url: https://app.example.com/api/avatar/large/12345678
      created_at: 2024-01-01T00:00:00Z
      id: "12345678"
      job_title: Developer
      language: en
      login: offline-user@example.com
      max_upload_size: 5368709120
      modified_at: 2024-01-01T00:00:00Z
      name: Offline User
      phone: 555-1234
      space_amount: 10737418240
      space_used: 1073741824
      status: active
      timezone: America/Los_Angeles
      type: user
- id: search-content
  match:
    methods:
    - GET
    url: ^/2\.0/search
  response:
    status: 200
    headers:
      content-type: application/json
    body:
      entries:
      - created_at: 2024-01-01T00:00:00Z
        id: "22222"
        name: presentation.pdf
        size: 1024000
        type: file
      - created_at: 2024-01-01T00:00:00Z
        id: "33333"
        name: spreadsheet.xlsx
        size: 512000
        type: file
      limit: 30
      offset: 0
      total_count: 2
