name: Body Matching and Conditions
description: Demonstrates body matchers and conditional routing
enabled: true
mocks:
- id: login-request
  priority: 200
  match:
    methods: ["POST"]
    url: /api/auth/login
    body:
      contains: ["username", "password"]
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "success": true,
        "token": "{{ fake_jwt() }}",
        "user": {
          "username": "{{ body_json.username | default(value='user') }}",
          "id": "{{ fake_uuid() }}",
          "email": "{{ fake_email() }}"
        },
        "expires_in": 3600
      }
- id: email-validation-request
  priority: 200
  match:
    methods: ["POST"]
    url: /api/validate/email
    body:
      regex: "\"email\":\\s*\"[^\"]+@[^\"]+\\.[^\"]+\""
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "valid": true,
        "email": "{{ body_json.email | default(value='unknown@example.com') }}",
        "domain": "{{ body_json.email | default(value='example.com') | split(pat='@') | last }}",
        "suggestions": []
      }
- id: admin-user-creation
  priority: 250
  match:
    methods: ["POST"]
    url: /api/users
    body:
      json_path:
        "$.role": admin
  response:
    status: 201
    headers:
      content-type: application/json
    template: |-
      {
        "id": "{{ fake_uuid() }}",
        "name": "{{ body_json.name | default(value=fake_name()) }}",
        "email": "{{ body_json.email | default(value=fake_email()) }}",
        "role": "admin",
        "permissions": [
          "read",
          "write",
          "delete",
          "admin"
        ],
        "created_at": "{{ fake_iso_date() }}"
      }
- id: regular-user-creation
  priority: 200
  match:
    methods: ["POST"]
    url: /api/users
    body:
      json_path:
        "$.role": user
  response:
    status: 201
    headers:
      content-type: application/json
    template: |-
      {
        "id": "{{ fake_uuid() }}",
        "name": "{{ body_json.name | default(value=fake_name()) }}",
        "email": "{{ body_json.email | default(value=fake_email()) }}",
        "role": "user",
        "permissions": [
          "read"
        ],
        "created_at": "{{ fake_iso_date() }}"
      }
- id: search-with-filters
  priority: 200
  match:
    methods: ["GET"]
    url: /api/search
    query:
      filter: active
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "query": "{{ query.q | default(value='') }}",
        "filter": "active",
        "results": [
          {% for i in range(start=0, end=5) %}
          {
            "id": "{{ fake_uuid() }}",
            "title": "{{ fake_sentence(words=5) }}",
            "status": "active",
            "score": {{ fake_float(min=0.5, max=1.0) | round(precision=2) }}
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ],
        "total": {{ fake_number(min=5, max=100) }}
      }
- id: oauth-password-grant
  priority: 200
  match:
    methods: ["POST"]
    url: /oauth/token
    body:
      "@grant_type=password": true
  response:
    status: 200
    headers:
      content-type: application/json
      cache-control: no-store
    template: |-
      {
        "access_token": "{{ fake_jwt() }}",
        "token_type": "Bearer",
        "expires_in": 3600,
        "refresh_token": "{{ fake_short_hash() }}",
        "scope": "read write",
        "grant_type": "password"
      }
- id: oauth-client-credentials-grant
  priority: 200
  match:
    methods: ["POST"]
    url: /oauth/token
    body:
      "@grant_type=client_credentials": true
  response:
    status: 200
    headers:
      content-type: application/json
      cache-control: no-store
    template: |-
      {
        "access_token": "{{ fake_jwt() }}",
        "token_type": "Bearer",
        "expires_in": 7200,
        "scope": "api:read api:write",
        "grant_type": "client_credentials"
      }
- id: payment-credit-card
  priority: 200
  match:
    methods: ["POST"]
    url: /api/payments
    body:
      json_path:
        "$.payment_method.type": credit_card
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "transaction_id": "{{ fake_uuid() }}",
        "status": "success",
        "payment_method": "credit_card",
        "amount": {{ body_json.amount | default(value=99.99) }},
        "currency": "{{ body_json.currency | default(value='USD') }}",
        "card_last4": "{{ fake_digit() }}{{ fake_digit() }}{{ fake_digit() }}{{ fake_digit() }}",
        "authorization_code": "{{ fake_short_hash() }}",
        "processed_at": "{{ fake_iso_date() }}"
      }
- id: payment-paypal
  priority: 200
  match:
    methods: ["POST"]
    url: /api/payments
    body:
      json_path:
        "$.payment_method.type": paypal
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "transaction_id": "{{ fake_uuid() }}",
        "status": "success",
        "payment_method": "paypal",
        "amount": {{ body_json.amount | default(value=99.99) }},
        "currency": "{{ body_json.currency | default(value='USD') }}",
        "paypal_transaction_id": "{{ fake_sha256() | truncate(length=16) }}",
        "payer_email": "{{ fake_email() }}",
        "processed_at": "{{ fake_iso_date() }}"
      }
- id: complete-registration
  priority: 200
  match:
    methods: ["POST"]
    url: /api/register
    body:
      contains: ["email", "password", "terms_accepted"]
  response:
    status: 201
    headers:
      content-type: application/json
    template: |-
      {
        "success": true,
        "user_id": "{{ fake_uuid() }}",
        "email": "{{ body_json.email | default(value=fake_email()) }}",
        "verification_sent": true,
        "created_at": "{{ fake_iso_date() }}",
        "message": "Registration successful. Please check your email to verify your account."
      }
- id: webhook-with-signature
  priority: 200
  match:
    methods: ["POST"]
    url: /webhooks/github
    headers:
      x-hub-signature-256: "~^sha256=[a-f0-9]{64}$"
    body:
      contains: ["action", "repository"]
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "processed",
        "event": "{{ body_json.action | default(value='unknown') }}",
        "repository": "{{ body_json.repository.name | default(value='unknown') }}",
        "processed_at": "{{ fake_iso_date() }}",
        "signature_valid": true
      }
- id: file-upload-large
  priority: 200
  match:
    methods: ["POST"]
    url: /api/files/upload
    body:
      "$.size": "10485760"
  response:
    status: 202
    headers:
      content-type: application/json
    template: |-
      {
        "upload_id": "{{ fake_uuid() }}",
        "status": "chunked_upload_required",
        "chunk_size": 5242880,
        "upload_url": "{{ fake_api_url() }}/files/upload/{{ fake_uuid() }}",
        "message": "File is too large for direct upload. Please use chunked upload."
      }
