mocks:
- id: pdf-download
  match:
    methods:
    - GET
    url: /api/documents/\d+/download
  response:
    status: 200
    headers:
      content-disposition: attachment; filename=document.pdf
      content-type: application/pdf
    template: |-
      {{ fake_pdf(text="Invoice #12345

      Total: $1,234.56
      Date: 2024-01-15

      Thank you for your business!") }}
- id: pdf-download-dynamic
  match:
    methods:
    - GET
    url: /api/invoices/(?P<invoice_id>\d+)
  response:
    status: 200
    headers:
      content-disposition: attachment; filename=invoice-{{ captures.invoice_id }}.pdf
      content-type: application/pdf
    template: |-
      {{ fake_pdf(text="Invoice #" ~ captures.invoice_id ~ "
      Generated: " ~ now() ~ "
      Customer: " ~ fake_name() ~ "
      Total: $" ~ fake_amount()) }}
- id: pdf-multipage
  match:
    methods:
    - GET
    url: /api/reports/(?P<report_id>\w+)
  response:
    status: 200
    headers:
      content-disposition: attachment; filename=report-{{ captures.report_id }}.pdf
      content-type: application/pdf
    template: |-
      {{ fake_pdf(text="Report: " ~ captures.report_id ~ "

      This is a multi-page report.

      Generated by: " ~ fake_name(), pages=5) }}
- id: image-png
  match:
    methods:
    - GET
    url: /api/images/avatar\.png
  response:
    status: 200
    headers:
      content-type: image/png
    template: '{{ fake_png(width=300, height=300, color="#4CAF50") }}'
- id: image-jpeg-dynamic
  match:
    methods:
    - GET
    url: /api/images/placeholder
  response:
    status: 200
    headers:
      content-type: image/jpeg
    template: '{{ fake_jpeg(width=query.width | default(value=1024) | int, height=query.height | default(value=768) | int, color=query.color | default(value="#FF5722"), quality=80) }}'
- id: image-random-color
  match:
    methods:
    - GET
    url: /api/images/random
  response:
    status: 200
    headers:
      content-type: image/png
    template: "{{ fake_png(width=800, height=600) }}"
- id: pdf-report
  match:
    methods:
    - GET
    url: /api/reports/(?P<report_id>\w+)
  response:
    status: 200
    headers:
      content-type: application/pdf
    template: |-
      {% set ts = now() | date(format='%Y-%m-%d %H:%M:%S') -%}
      {% set report_text = "Report ID: " ~ captures.report_id ~ "
      Generated: " ~ ts ~ "
      Author: " ~ fake_name() ~ "
      Department: " ~ fake_job_field() ~ "

      Summary:
      " ~ fake_paragraph() ~ "

      Contact: " ~ fake_email() ~ "
      Phone: " ~ fake_phone() %}
      {{ fake_pdf(text=report_text) }}
- id: user-profile-with-data-uri
  match:
    methods:
    - GET
    url: /api/users/(?P<user_id>\d+)
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "id": "{{ captures.user_id }}",
        "name": "{{ fake_name() }}",
        "email": "{{ fake_email() }}",
        "avatar": "{{ fake_png_data_uri(width=200, height=200, color='#FF5722') }}",
        "created_at": "{{ now() | date(format='%Y-%m-%dT%H:%M:%SZ') }}"
      }
- id: html-page-with-embedded-images
  match:
    methods:
    - GET
    url: /gallery
  response:
    status: 200
    headers:
      content-type: text/html
    template: |-
      <!DOCTYPE html>
      <html>
      <head>
        <title>Image Gallery</title>
        <style>
          body { font-family: Arial; padding: 20px; }
          .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
          img { width: 100%; border-radius: 8px; }
        </style>
      </head>
      <body>
        <h1>Gallery</h1>
        <div class="gallery">
          {% for i in range(start=0, end=6) %}
          <div>
            <img src="{{ fake_jpeg_data_uri(width=400, height=300) }}" alt="Image {{ i }}">
            <p>Image {{ i + 1 }}</p>
          </div>
          {% endfor %}
        </div>
      </body>
      </html>
- id: document-list-with-download-links
  match:
    methods:
    - GET
    url: /api/documents
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "documents": [
          {% for i in range(start=1, end=4) %}
            {
              "id": "{{ uuid() }}",
              "name": "Document {{ i }}.pdf",
              "size": {{ fake_file_size(min=10000, max=1000000) }},
              "download_url": "{{ fake_pdf_data_uri(text='Document ' ~ i ~ ' content') }}",
              "created_at": "{{ now() | date(format='%Y-%m-%dT%H:%M:%SZ') }}"
            }{% if not loop.last %},{% endif %}
          {% endfor %}
        ]
      }
- id: email-with-inline-images
  match:
    methods:
    - GET
    url: /api/emails/preview
  response:
    status: 200
    headers:
      content-type: text/html
    template: |-
      <!DOCTYPE html>
      <html>
      <head>
        <style>
          .email { max-width: 600px; margin: 0 auto; font-family: Arial; }
          .header-img { width: 100%; height: auto; }
          .logo { width: 150px; }
        </style>
      </head>
      <body>
        <div class="email">
          <img class="logo" src="{{ fake_png_data_uri(width=150, height=50, color='#2196F3') }}" alt="Logo">
          <h1>Welcome!</h1>
          <img class="header-img" src="{{ fake_jpeg_data_uri(width=600, height=200, color='#4CAF50', quality=90) }}" alt="Header">
          <p>Thank you for joining us!</p>
          <p>Best regards,<br>The Team</p>
        </div>
      </body>
      </html>
