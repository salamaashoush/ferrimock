mocks:
- id: test-pdf-simple
  match:
    methods:
    - GET
    url: /test/pdf
  response:
    status: 200
    headers:
      content-disposition: inline; filename=test.pdf
      content-type: application/pdf
    template: |-
      {{ fake_pdf(text="Test PDF Document
      Generated by box-dev-gate

      This is a test to verify PDF rendering in browsers.

      Invoice #12345
      Amount: $999.99
      Date: 2025-01-15") }}
- id: test-pdf-multipage
  match:
    methods:
    - GET
    url: /test/pdf/multipage
  response:
    status: 200
    headers:
      content-disposition: inline; filename=multipage.pdf
      content-type: application/pdf
    template: |-
      {{ fake_pdf(text="Multi-Page Test Document
      This document has 5 pages.", pages=5) }}
- id: test-pdf-download
  match:
    methods:
    - GET
    url: /test/pdf/download
  response:
    status: 200
    headers:
      content-disposition: attachment; filename=invoice-12345.pdf
      content-type: application/pdf
    template: |-
      {% set invoice_date = now() | date(format='%Y-%m-%d') %}
      {{ fake_pdf(text="INVOICE #12345

      Customer: " ~ fake_name() ~ "
      Email: " ~ fake_email() ~ "
      Address: " ~ fake_street_address() ~ ", " ~ fake_city() ~ "

      Amount Due: $" ~ fake_price(min=100, max=5000) ~ "
      Date: " ~ invoice_date ~ "

      Thank you for your business!") }}
- id: test-png-basic
  match:
    methods:
    - GET
    url: /test/png
  response:
    status: 200
    headers:
      content-type: image/png
    template: '{{ fake_png(width=800, height=600, color="#4CAF50") }}'
- id: test-png-dynamic
  match:
    methods:
    - GET
    url: /test/png/dynamic
  response:
    status: 200
    headers:
      content-type: image/png
    template: |-
      {{ fake_png(
        width=query.w | default(value="400") | int,
        height=query.h | default(value="300") | int,
        color=query.color | default(value="#FF5733")
      ) }}
- id: test-jpeg-basic
  match:
    methods:
    - GET
    url: /test/jpeg
  response:
    status: 200
    headers:
      content-type: image/jpeg
    template: '{{ fake_jpeg(width=1920, height=1080, color="#2196F3", quality=85) }}'
- id: test-jpeg-thumbnail
  match:
    methods:
    - GET
    url: /test/jpeg/thumb
  response:
    status: 200
    headers:
      content-type: image/jpeg
    template: "{{ fake_jpeg(width=150, height=150, quality=60) }}"
- id: test-html-with-images
  match:
    methods:
    - GET
    url: /test/html
  response:
    status: 200
    headers:
      content-type: text/html
    body: |-
      <!DOCTYPE html>
      <html>
      <head>
        <title>File Generation Test Page</title>
        <style>
          body { font-family: Arial, sans-serif; margin: 40px; }
          h1 { color: #333; }
          .test-section { margin: 30px 0; padding: 20px; border: 1px solid #ddd; }
          img { max-width: 100%; margin: 10px 0; }
          a { color: #2196F3; text-decoration: none; padding: 10px 15px; background: #f0f0f0; border-radius: 4px; display: inline-block; margin: 5px; }
          a:hover { background: #e0e0e0; }
        </style>
      </head>
      <body>
        <h1>Box Dev Gate - File Generation Tests</h1>

        <div class="test-section">
          <h2>PDF Tests</h2>
          <p>Click the links below to test PDF generation in your browser:</p>
          <a href="/test/pdf" target="_blank">Simple PDF (view inline)</a>
          <a href="/test/pdf/multipage" target="_blank">Multi-page PDF (5 pages)</a>
          <a href="/test/pdf/download" target="_blank">PDF Download (with dynamic data)</a>
        </div>

        <div class="test-section">
          <h2>PNG Tests</h2>
          <h3>Static PNG (800x600, green)</h3>
          <img src="/test/png" alt="Test PNG">

          <h3>Dynamic PNG (try changing URL params: ?w=600&h=400&color=%23FF0000)</h3>
          <img src="/test/png/dynamic?w=600&h=400&color=%23FF5733" alt="Dynamic PNG">
        </div>

        <div class="test-section">
          <h2>JPEG Tests</h2>
          <h3>High Quality JPEG (1920x1080)</h3>
          <img src="/test/jpeg" alt="Test JPEG" style="max-width: 600px;">

          <h3>Thumbnail JPEG (150x150, compressed)</h3>
          <img src="/test/jpeg/thumb" alt="Thumbnail JPEG">
        </div>

        <div class="test-section">
          <h2>Data URI Test (JSON with embedded image)</h2>
          <p>Open browser console and check the JSON response:</p>
          <button onclick="fetchDataUri()">Fetch JSON with Data URI</button>
          <pre id="json-output" style="background: #f5f5f5; padding: 10px; margin-top: 10px;"></pre>
          <img id="data-uri-img" style="display:none; margin-top: 10px;">
        </div>

        <script>
          async function fetchDataUri() {
            try {
              const response = await fetch('/test/api/user');
              const data = await response.json();
              document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);

              // Display the embedded image
              const img = document.getElementById('data-uri-img');
              img.src = data.avatar;
              img.style.display = 'block';
            } catch (error) {
              document.getElementById('json-output').textContent = 'Error: ' + error.message;
            }
          }
        </script>
      </body>
      </html>
- id: test-api-user-with-avatar
  match:
    methods:
    - GET
    url: /test/api/user
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "id": "{{ uuid() }}",
        "name": "{{ fake_name() }}",
        "email": "{{ fake_email() }}",
        "company": "{{ fake_company() }}",
        "avatar": "{{ fake_png_data_uri(width=200, height=200, color='#9C27B0') }}"
      }
