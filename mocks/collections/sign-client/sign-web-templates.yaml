# ──────────────────────────────────────────────────────────────────────
# GET /docs/templates/ - List templates (MDQ)
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-mdq-templates
  description: Returns paginated list of templates
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/docs/templates/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {%- set total = store_get_or_set(key="templates.total", default="8") | int -%}
      {
        "templates": [
          {% for i in range(start=0, end=total) %}
          {
            "uuid": "{{ fake_uuid() }}",
            "name": "Template-{{ i + 1 }}-{{ fake_word() }}.pdf",
            "created": "{{ fake_date() }}",
            "modified": "{{ fake_date() }}",
            "signrequest": {
              "uuid": "{{ fake_uuid() }}",
              "from_email": "{{ vars.user_email }}",
              "subject": "Template: {{ fake_sentence(word_count=3) }}",
              "who": "o"
            },
            "sign_files": [
              {
                "name": "Template-{{ i + 1 }}.pdf",
                "uuid": "{{ fake_uuid() }}",
                "box_file_id": "{{ fake_numeric_id() }}",
                "is_main_file": true,
                "not_found_in_box": false
              }
            ]
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ],
        "count": {{ total }},
        "is_paginated": false
      }

# ──────────────────────────────────────────────────────────────────────
# POST /docs/save-template/ - Save template
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-save-template
  description: Saves a template configuration
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/docs/save-template/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "uuid": "{{ fake_uuid() }}",
        "name": "{{ fake_filename() }}"
      }

# ──────────────────────────────────────────────────────────────────────
# DELETE /docs/delete-template/ - Delete template
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-delete-template
  description: Deletes a template
  priority: 100
  match:
    methods: ["POST", "DELETE"]
    url: "/app-api/sign-web/docs/delete-template/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      status: "success"

# ──────────────────────────────────────────────────────────────────────
# POST /docs/upload-as-template/ - Upload file as template
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-upload-as-template
  description: Uploads a file to create a new template
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/docs/upload-as-template/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "uuid": "{{ fake_uuid() }}",
        "name": "{{ fake_filename() }}",
        "sign_files": [
          {
            "name": "{{ fake_filename() }}",
            "uuid": "{{ fake_uuid() }}",
            "box_file_id": "{{ fake_numeric_id() }}",
            "box_file_version_id": "{{ fake_numeric_id() }}",
            "box_folder_id": "{{ fake_numeric_id() }}",
            "is_main_file": true,
            "original_as_pdf": "{{ mock_pdf_url() }}",
            "not_found_in_box": false
          }
        ]
      }

# ──────────────────────────────────────────────────────────────────────
# POST /template/field-restrictions-checker/ - Field restrictions
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-template-field-restrictions-checker
  description: Validates field restrictions for a template
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/template/field-restrictions-checker/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      restrictions: {}

# ──────────────────────────────────────────────────────────────────────
# POST /template/file-limits-checker/ - File limits check
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-template-file-limits-checker
  description: Checks file size/count limits for template operations
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/template/file-limits-checker/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      within_limits: true
      max_file_size: 52428800
      max_file_count: 10
