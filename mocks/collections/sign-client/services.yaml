# ══════════════════════════════════════════════════════════════════════
# PUBLIC API SERVICE (Box API 2.0)
# ══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# GET /files/:fileId/content - File content download
# ──────────────────────────────────────────────────────────────────────
- id: public-api-get-file-content
  description: Returns file content as a PDF for preview/download
  priority: 100
  match:
    methods: ["GET"]
    url: "/api/2.0/files/:fileId/content"
  response:
    status: 200
    headers:
      content-type: application/pdf
      content-disposition: attachment; filename=document.pdf
    template: |-
      {%- set ts = now() | date(format='%Y-%m-%d %H:%M:%S') -%}
      {%- set para = fake_paragraph() -%}
      {%- set pdf_text = "Document Content -- File ID: " ~ captures.fileId ~ " -- Generated: " ~ ts ~ " -- This is a sample document for signing. Please review all pages before signing. -- " ~ para -%}
      {{ fake_pdf(text=pdf_text) }}

# ──────────────────────────────────────────────────────────────────────
# POST /files/:fileId/upload_sessions - Chunked upload session
# ──────────────────────────────────────────────────────────────────────
- id: public-api-file-upload-session
  description: Creates a chunked upload session for large files
  priority: 100
  match:
    methods: ["POST"]
    url: "/api/2.0/files/:fileId/upload_sessions"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {%- set session_id = fake_uuid() -%}
      {
        "upload_session": {
          "id": "{{ session_id }}",
          "type": "upload_session",
          "upload_url": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}",
          "session_expires_at": "2030-12-31T23:59:59Z",
          "session_endpoints": {
            "abort": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}",
            "commit": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}/commit",
            "list_parts": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}/parts",
            "upload_part": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}",
            "status": "https://upload.box.com/api/2.0/files/upload_sessions/{{ session_id }}"
          },
          "parameters": {
            "Content-Type": "application/octet-stream"
          },
          "part_size": 8388608,
          "total_parts": 1
        },
        "entries": [
          {
            "type": "file",
            "id": "{{ captures.fileId }}",
            "file_version": {
              "type": "file_version",
              "id": "{{ fake_numeric_id() }}"
            },
            "name": "{{ fake_filename() }}",
            "size": {{ fake_file_size(min=100000, max=5000000) }},
            "created_at": "{{ fake_date() }}",
            "modified_at": "{{ fake_date() }}",
            "created_by": {
              "type": "user",
              "id": "{{ store_get_or_set(key='box.user.id', default=fake_numeric_id()) }}",
              "name": "{{ store_get_or_set(key='box.user.name', default=fake_name()) }}",
              "login": "{{ store_get_or_set(key='box.user.email', default=fake_email()) }}"
            },
            "modified_by": {
              "type": "user",
              "id": "{{ store_get_or_set(key='box.user.id', default=fake_numeric_id()) }}",
              "name": "{{ store_get_or_set(key='box.user.name', default=fake_name()) }}",
              "login": "{{ store_get_or_set(key='box.user.email', default=fake_email()) }}"
            }
          }
        ]
      }

# ══════════════════════════════════════════════════════════════════════
# MONOLITH SERVICE
# ══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# GET /authorize/upload-session-token/ - Upload scoped token
# ──────────────────────────────────────────────────────────────────────
- id: monolith-get-upload-scoped-token
  description: Returns a scoped access token for file uploads
  priority: 100
  match:
    methods: ["GET"]
    url: "/api/2.0/authorize/upload-session-token/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "access_token": "{{ fake_jwt() }}",
        "token_type": "bearer",
        "expires_in": 3600,
        "restricted_to": "/api/2.0/files/content"
      }

# ══════════════════════════════════════════════════════════════════════
# BOX TOOLS SERVICE
# ══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# GET /connection/ - Box Tools connection status
# ──────────────────────────────────────────────────────────────────────
- id: box-tools-connection
  description: Returns Box Tools desktop application connection status
  priority: 100
  match:
    methods: ["GET"]
    url: "/box-tools/api/connection/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      running: true
      version: "5.0.0"

# ──────────────────────────────────────────────────────────────────────
# GET /list-identities/ - Smart card identities
# ──────────────────────────────────────────────────────────────────────
- id: box-tools-list-identities
  description: Returns available smart card/certificate identities for digital signing
  priority: 100
  match:
    methods: ["GET"]
    url: "/box-tools/api/list-identities/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "identities": [
          {
            "id": "{{ fake_uuid() }}",
            "subject": "CN={{ fake_name() }}, O={{ fake_company() }}, C=US",
            "issuer": "CN={{ fake_company() }} Root CA, O={{ fake_company() }}, C=US",
            "thumbprint": "{{ fake_sha256() | truncate(length=40) }}",
            "valid_from": "{{ fake_iso_date() }}",
            "valid_to": "2030-12-31"
          },
          {
            "id": "{{ fake_uuid() }}",
            "subject": "CN={{ fake_name() }}, O={{ fake_company() }}, C=US",
            "issuer": "CN=DigiCert SHA2 Assured ID CA, O=DigiCert Inc, C=US",
            "thumbprint": "{{ fake_sha256() | truncate(length=40) }}",
            "valid_from": "{{ fake_iso_date() }}",
            "valid_to": "2029-06-30"
          }
        ]
      }

# ──────────────────────────────────────────────────────────────────────
# GET /supported-algorithms/ - Cryptographic algorithm support
# ──────────────────────────────────────────────────────────────────────
- id: box-tools-supported-algorithms
  description: Returns supported hash and encryption algorithms with OIDs
  priority: 100
  match:
    methods: ["GET"]
    url: "/box-tools/api/supported-algorithms/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      algorithms:
      - hashAlgorithm: "SHA256"
        encryptionAlgorithm: "RSA"
        OID: "1.2.840.113549.1.1.11"
      - hashAlgorithm: "SHA384"
        encryptionAlgorithm: "RSA"
        OID: "1.2.840.113549.1.1.12"
      - hashAlgorithm: "SHA512"
        encryptionAlgorithm: "RSA"
        OID: "1.2.840.113549.1.1.13"
      - hashAlgorithm: "SHA256"
        encryptionAlgorithm: "ECDSA"
        OID: "1.2.840.10045.4.3.2"
      - hashAlgorithm: "SHA384"
        encryptionAlgorithm: "ECDSA"
        OID: "1.2.840.10045.4.3.3"
      - hashAlgorithm: "SHA512"
        encryptionAlgorithm: "ECDSA"
        OID: "1.2.840.10045.4.3.4"

# ──────────────────────────────────────────────────────────────────────
# POST /sign-hash/ - Sign hash with smart card
# ──────────────────────────────────────────────────────────────────────
- id: box-tools-sign-hash
  description: Signs a document hash using a smart card certificate
  priority: 100
  match:
    methods: ["POST"]
    url: "/box-tools/api/sign-hash/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "signature": "{{ fake_base64() }}{{ fake_base64() }}",
        "certificate": "{{ fake_base64() }}{{ fake_base64() }}{{ fake_base64() }}"
      }

# ══════════════════════════════════════════════════════════════════════
# COMMON RESOURCES
# ══════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────
# Google Fonts no-op (prevent font loading errors)
# ──────────────────────────────────────────────────────────────────────
- id: common-google-fonts-noop
  description: No-op handler for Google Material Icons font requests
  priority: 50
  match:
    methods: ["GET"]
    url: "/css"
    headers:
      host: "~fonts\\.googleapis\\.com"
  response:
    status: 200
    headers:
      content-type: text/css
    body: ""

# ──────────────────────────────────────────────────────────────────────
# dl.boxcloud.com file downloads - Single page PDF
# ──────────────────────────────────────────────────────────────────────
- id: common-dl-boxcloud-single
  description: Serves a single-page PDF from Box CDN mock
  priority: 50
  match:
    methods: ["GET"]
    url: "/d/.*"
    headers:
      host: "~dl\\.boxcloud\\.com"
  response:
    status: 200
    headers:
      content-type: application/pdf
      content-disposition: attachment; filename=template.pdf
    template: |-
      {%- set party_a = fake_name() -%}
      {%- set party_b = fake_name() -%}
      {%- set today = now() | date(format='%Y-%m-%d') -%}
      {%- set terms = fake_paragraph() -%}
      {%- set details = fake_paragraph() -%}
      {%- set pdf_text = "AGREEMENT -- This document constitutes a legally binding agreement between the parties. -- Party A: " ~ party_a ~ " -- Party B: " ~ party_b ~ " -- Date: " ~ today ~ " -- Terms and Conditions: " ~ terms ~ " -- " ~ details ~ " -- Signatures Required Below" -%}
      {{ fake_pdf(text=pdf_text) }}

# ──────────────────────────────────────────────────────────────────────
# Multi-page PDF resource
# ──────────────────────────────────────────────────────────────────────
- id: common-multipage-pdf
  description: Serves a multi-page PDF document for testing
  priority: 60
  match:
    methods: ["GET"]
    url: "/localResources/multiPageTemplate.pdf"
  response:
    status: 200
    headers:
      content-type: application/pdf
      content-disposition: attachment; filename=multiPageTemplate.pdf
    template: |-
      {%- set intro = fake_paragraph() -%}
      {%- set terms = fake_paragraph() -%}
      {%- set obligations = fake_paragraph() -%}
      {%- set today = now() | date(format='%Y-%m-%d') -%}
      {%- set pdf_text = "MULTI-PAGE CONTRACT -- Page 1: Introduction -- " ~ intro ~ " -- Page 2: Terms -- " ~ terms ~ " -- Page 3: Obligations -- " ~ obligations ~ " -- Page 4: Signatures -- Date: " ~ today -%}
      {{ fake_pdf(text=pdf_text, pages=4) }}
