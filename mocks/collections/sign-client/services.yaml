# ──────────────────────────────────────────────────────────────────────
# GET /user/avatar/ - User avatar image
# ──────────────────────────────────────────────────────────────────────
- id: enduserapp-get-user-avatar
  description: Returns the user avatar as a JPEG image
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/end-user-app/user/avatar/"
  response:
    status: 200
    headers:
      content-type: image/jpeg
    template: |-
      {%- set initials = store_get_or_set(key="box.user.name", default="JB") | truncate(length=2) -%}
      {{ fake_avatar(initials=initials, size=200, bg_color="#0061D5", text_color="#FFFFFF") }}

# ──────────────────────────────────────────────────────────────────────
# Mock avatar path (profile.boxcloud.com)
# ──────────────────────────────────────────────────────────────────────
- id: mock-avatar-path
  description: Serves avatar images from the mock profile CDN
  priority: 100
  match:
    methods: ["GET"]
    url: "/user/.*"
    headers:
      host: "~mock\\.profile\\.boxcloud\\.com"
  response:
    status: 200
    headers:
      content-type: image/jpeg
    template: |-
      {{ fake_avatar(initials="JB", size=200, bg_color="#0061D5", text_color="#FFFFFF") }}

