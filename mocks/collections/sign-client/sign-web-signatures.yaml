name: "Sign Client - Signatures & Signing"
description: "Sign-web signature operations, sign request creation, revise, verification, and smart card"
enabled: true

vars:
  user_email: "signer@boxdemo.com"

mocks:
# ──────────────────────────────────────────────────────────────────────
# POST /docs/signrequest/ - Create sign request
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-create-sign-request
  description: Creates a new sign request and returns redirect URL
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/docs/signrequest/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {%- set doc_uuid = fake_uuid() -%}
      {%- set redirect_uuid = fake_uuid() -%}
      {
        "status": "SUCCESS",
        "message": "Sign request created successfully",
        "redirect_url": "/sign/{{ redirect_uuid }}/",
        "doc": {
          "uuid": "{{ doc_uuid }}",
          "short_id": "{{ fake_alphanumeric(length=8) | upper }}",
          "name": "{{ fake_filename() }}",
          "status": {
            "code": "sent",
            "name": "Sent"
          },
          "created": "{{ now() | date(format='%Y-%m-%dT%H:%M:%SZ') }}",
          "signrequest": {
            "uuid": "{{ fake_uuid() }}",
            "from_email": "{{ vars.user_email }}",
            "who": "o"
          },
          "sign_files": [
            {
              "name": "{{ fake_filename() }}",
              "uuid": "{{ fake_uuid() }}",
              "box_file_id": "{{ fake_numeric_id() }}",
              "box_file_version_id": "{{ fake_numeric_id() }}",
              "box_folder_id": "{{ fake_numeric_id() }}",
              "is_main_file": true,
              "original_as_pdf": "{{ mock_pdf_url() }}",
              "not_found_in_box": false
            }
          ]
        },
        "force_reload": false
      }

# ──────────────────────────────────────────────────────────────────────
# GET /docs/revise/ - Get revise document data
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-revise-doc
  description: Returns document data for revision/editing with full signer details
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/docs/revise/(?P<doc_id>[^/]+)"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {%- set doc_uuid = captures.doc_id | default(value=fake_uuid()) -%}
      {%- set file_uuid = fake_uuid() -%}
      {%- set frame_part1 = fake_alphanumeric(length=8) | upper -%}
      {%- set frame_part2 = fake_alphanumeric(length=8) | upper -%}
      {%- set frame_id = frame_part1 ~ "-" ~ frame_part2 -%}
      {%- set owner_email = vars.user_email -%}
      {%- set signer_email = fake_email() -%}
      {
        "doc": {
          "uuid": "{{ doc_uuid }}",
          "short_id": "{{ fake_alphanumeric(length=8) | upper }}",
          "name": "{{ fake_filename() }}",
          "box_file_id": "{{ fake_numeric_id() }}",
          "box_file_version_id": "{{ fake_numeric_id() }}",
          "box_folder_id": "{{ fake_numeric_id() }}",
          "box_source_file_id": "{{ fake_numeric_id() }}",
          "box_source_file_version_id": "{{ fake_numeric_id() }}",
          "status": {
            "code": "sent",
            "name": "Sent"
          },
          "created": "{{ fake_date() }}",
          "signrequest": {
            "uuid": "{{ fake_uuid() }}",
            "from_email": "{{ owner_email }}",
            "subject": "Please sign this document",
            "message": "{{ fake_sentence(word_count=10) }}",
            "who": "o",
            "send_reminders": true,
            "locked_recipients": false,
            "locked_fields": false,
            "locked_request_type": null,
            "signers": [
              {
                "public_id": "{{ fake_alphanumeric(length=8) | upper }}",
                "level": "signature",
                "needs_to_sign": true,
                "approve_only": false,
                "notify_only": false,
                "in_person": false,
                "order": 1,
                "language": "en",
                "force_language": false,
                "required_attachments": [],
                "group": null,
                "name": "{{ owner_email }}",
                "full_name": "{{ fake_name() }}",
                "email": "{{ owner_email }}",
                "signature_frame_id": "{{ frame_id }}",
                "signed": false,
                "status": "viewed",
                "status_code": "viewed",
                "signed_on": null,
                "declined": false,
                "declined_on": null,
                "cancelled": false,
                "cancelled_on": null,
                "expired": false,
                "can_be_cancelled": true,
                "is_owner": true,
                "action_required": true,
                "emailed": false,
                "last_email_sent": null,
                "uuid": null,
                "attachments": [],
                "verify_phone_number": null,
                "phone_number_verified": false,
                "forwarded_on": null,
                "forwarded_reason": null,
                "forwarded_to_email": null,
                "processing": null,
                "replaced_on": null,
                "replaced_by_email": null,
                "required_password": false,
                "required_phone_number": false,
                "login_required": false,
                "can_add_placeholders": true,
                "signer_index": null
              },
              {
                "public_id": "{{ fake_alphanumeric(length=8) | upper }}",
                "level": "signature",
                "needs_to_sign": true,
                "approve_only": false,
                "notify_only": false,
                "in_person": false,
                "order": 2,
                "language": "en",
                "force_language": false,
                "required_attachments": [],
                "group": null,
                "name": "{{ signer_email }}",
                "full_name": "{{ fake_name() }}",
                "email": "{{ signer_email }}",
                "signature_frame_id": "{{ frame_id }}",
                "signed": false,
                "status": "waiting",
                "status_code": "waiting",
                "signed_on": null,
                "declined": false,
                "declined_on": null,
                "cancelled": false,
                "cancelled_on": null,
                "expired": false,
                "can_be_cancelled": true,
                "is_owner": false,
                "action_required": true,
                "emailed": false,
                "last_email_sent": null,
                "uuid": null,
                "attachments": [],
                "verify_phone_number": null,
                "phone_number_verified": false,
                "forwarded_on": null,
                "forwarded_reason": null,
                "forwarded_to_email": null,
                "processing": null,
                "replaced_on": null,
                "replaced_by_email": null,
                "required_password": false,
                "required_phone_number": false,
                "login_required": false,
                "can_add_placeholders": true,
                "signer_index": null
              }
            ]
          },
          "placeholders": [
            {
              "page_index": 0,
              "page_uuid": null,
              "editable": true,
              "action_required": false,
              "type": "s",
              "required": true,
              "prefill": false,
              "uuid": "{{ fake_uuid() }}",
              "origin": "pi",
              "external_id": null,
              "repeat_on_all": false,
              "multiline": false,
              "signer_email": "{{ owner_email }}",
              "signer_index": null,
              "signer_order": 1,
              "comment": "",
              "description": null,
              "text": null,
              "checkbox_value": null,
              "date_value": null,
              "data_uri": "",
              "x_pos": 0.063878,
              "y_pos": 0.090668,
              "width_p": 0.262449,
              "height_p": 0.042909,
              "font_family": "sans-serif",
              "font_size": 14,
              "document_uuid": "{{ doc_uuid }}",
              "group_uuid": null,
              "order_in_group": null,
              "choices": null,
              "signer_group": null
            }
          ],
          "sign_files": [
            {
              "name": "{{ fake_filename() }}",
              "uuid": "{{ file_uuid }}",
              "box_file_id": "{{ fake_numeric_id() }}",
              "box_file_version_id": "{{ fake_numeric_id() }}",
              "box_folder_id": "{{ fake_numeric_id() }}",
              "box_source_file_id": "{{ fake_numeric_id() }}",
              "box_source_file_version_id": "{{ fake_numeric_id() }}",
              "is_main_file": true,
              "original_as_pdf": "{{ mock_pdf_url() }}",
              "not_found_in_box": false
            }
          ],
          "sign_flow": null,
          "not_found_in_box": false
        },
        "is_access_coowner": false,
        "folder": {
          "type": "folder",
          "id": "{{ fake_numeric_id() }}",
          "name": "My Sign Requests",
          "etag": "0",
          "sequence_id": "0"
        }
      }

# ──────────────────────────────────────────────────────────────────────
# PUT /docs/revise/ - Submit revise request
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-put-revise-request
  description: Submits a revised sign request
  priority: 100
  match:
    methods: ["PUT"]
    url: "/app-api/sign-web/docs/revise/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "SUCCESS",
        "message": "Document revised successfully",
        "redirect_url": "/sign/{{ fake_uuid() }}/"
      }

# ──────────────────────────────────────────────────────────────────────
# PATCH /docs/start-editing-signrequest/ - Start editing a sign request
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-patch-start-editing
  description: Begins editing mode for an existing sign request
  priority: 100
  match:
    methods: ["PATCH"]
    url: "/app-api/sign-web/docs/start-editing-signrequest/.*"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "uuid": "{{ fake_uuid() }}"
      }

# ──────────────────────────────────────────────────────────────────────
# POST /signature/save-signature/ - Save user signature
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-save-signature
  description: Saves a drawn or typed signature for the user
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/signature/save-signature/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "signature_uuid": "{{ fake_uuid() }}"
      }

# ──────────────────────────────────────────────────────────────────────
# POST /docs/markup-signature/ - Apply markup signature
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-markup-signature
  description: Applies a signature markup to a document field
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/docs/markup-signature/.*"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "data_uri": "{{ fake_png_data_uri(width=400, height=150, color='#FFFFFF') }}",
        "document_image_snippet_pending_uuid": "{{ fake_uuid() }}"
      }

# ──────────────────────────────────────────────────────────────────────
# POST /docs/delete-signature/ - Delete a signature
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-delete-signature
  description: Deletes a saved user signature
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/docs/delete-signature/.*"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      status: "success"

# ──────────────────────────────────────────────────────────────────────
# POST /verify-signature/ - Apply signatures to document
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-documents-apply-signatures
  description: Verifies and applies all signatures to a document
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/verify-signature/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "document_uuid": "{{ fake_uuid() }}",
        "redirect_url": "/sign/complete/{{ fake_uuid() }}/"
      }

# ──────────────────────────────────────────────────────────────────────
# GET /verification-method/ - Get available verification methods
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-verification-method
  description: Returns available identity verification methods
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/verification-method/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      methods:
      - type: "text_message"
        enabled: true
      - type: "password"
        enabled: true

# ──────────────────────────────────────────────────────────────────────
# POST /send-text-message/ - Send SMS verification
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-send-text-message
  description: Sends an SMS verification code to the signer
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/send-text-message/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "status": "success",
        "message_id": "{{ fake_uuid() }}"
      }

# ──────────────────────────────────────────────────────────────────────
# POST /verify-text-message/ - Verify SMS code
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-post-verify-text-message
  description: Verifies the SMS verification code
  priority: 100
  match:
    methods: ["POST"]
    url: "/app-api/sign-web/verify-text-message/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      verified: true

# ──────────────────────────────────────────────────────────────────────
# GET /ready-sign-links/ - Ready sign links list
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-ready-sign-links
  description: Returns list of ready sign links (self-serve signing URLs)
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/ready-sign-links/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "results": [
          {% for i in range(start=0, end=3) %}
          {
            "uuid": "{{ fake_uuid() }}",
            "name": "RSL-{{ fake_word() | title }}",
            "url": "https://app.box.com/sign/ready/{{ fake_alphanumeric(length=12) }}",
            "template_uuid": "{{ fake_uuid() }}",
            "created": "{{ fake_date() }}",
            "active": true,
            "sign_count": {{ get_random(start=0, end=50) }}
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ],
        "count": 3
      }

# ──────────────────────────────────────────────────────────────────────
# GET /ready-sign-link-config/ - Ready sign link configuration
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-ready-sign-link-config
  description: Returns RSL configuration options
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/ready-sign-link-config/"
  response:
    status: 200
    headers:
      content-type: application/json
    json:
      enabled: true
      max_links: 50
      require_login: false

# ──────────────────────────────────────────────────────────────────────
# GET /smart-card-certificate/ - Smart card certificate
# ──────────────────────────────────────────────────────────────────────
- id: sign-web-get-smart-card-certificate
  description: Returns smart card certificate information for digital signing
  priority: 100
  match:
    methods: ["GET"]
    url: "/app-api/sign-web/smart-card-certificate/"
  response:
    status: 200
    headers:
      content-type: application/json
    template: |-
      {
        "certificate": {
          "subject": "CN={{ fake_name() }}, O={{ fake_company() }}, C=US",
          "issuer": "CN={{ fake_company() }} CA, O={{ fake_company() }}, C=US",
          "thumbprint": "{{ fake_sha256() | truncate(length=40) }}",
          "valid_from": "{{ fake_iso_date() }}",
          "valid_to": "2030-12-31",
          "serial_number": "{{ fake_alphanumeric(length=20) | upper }}"
        }
      }
